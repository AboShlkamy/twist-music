<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تحديث الخدمة</title>

<style>
body{
    margin:0;
    padding:0;
    background:#0f172a;
    font-family:Tahoma;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    width:320px;
    background:#1e293b;
    border-radius:20px;
    padding:30px;
    text-align:center;
    box-shadow:0 0 25px rgba(0,0,0,0.5);
}

.title{
    color:#fff;
    font-size:24px;
    margin-bottom:20px;
}

.sub{
    color:#cbd5e1;
    margin-bottom:25px;
    font-size:18px;
}

.btn{
    display:inline-block;
    text-decoration:none;
    background:#0088cc;
    color:white;
    padding:14px 25px;
    border-radius:12px;
    font-size:18px;
    transition:0.3s;
}

.btn:hover{
    background:#00a2f0;
    transform:scale(1.05);
}
</style>
</head>

<body>

<div class="box">
    <div class="title">🌹 جاري تحديث الخدمة</div>
    
    <div class="sub">
        تابع القناة لمعرفة آخر التحديثات
    </div>

    <a class="btn" href="https://t.me/mabowaged_eg">
        الدخول للقناه 
    </a>
</div>

</body>
</html>
